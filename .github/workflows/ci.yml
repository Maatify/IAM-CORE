name: IAM-CORE CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  quality:
    name: Quality Checks (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: [ "8.2", "8.3", "8.4" ]

    services:
      # -------------------------------------------------
      # MySQL Service (Integration Tests)
      # -------------------------------------------------
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      # -------------------------------------------------
      # 1) Checkout Repository
      # -------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------------------------
      # 2) Setup PHP Environment
      # -------------------------------------------------
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
          coverage: none

      # -------------------------------------------------
      # 3) Cache Composer Dependencies
      # -------------------------------------------------
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      # -------------------------------------------------
      # 4) Validate composer.json Structure
      # -------------------------------------------------
      - name: Validate composer.json
        run: composer validate --strict

      # -------------------------------------------------
      # 5) Install Project Dependencies
      # -------------------------------------------------
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      # -------------------------------------------------
      # 6) Verify Platform Requirements
      # -------------------------------------------------
      - name: Check platform requirements
        run: composer check-platform-reqs

      # -------------------------------------------------
      # 7) Security Audit (Fail on Vulnerabilities)
      # -------------------------------------------------
      - name: Composer Security Audit
        run: composer audit --format=plain

      # -------------------------------------------------
      # 8) Create Test Database (MySQL)
      # -------------------------------------------------
      - name: Create test database
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASS: root
          DB_NAME: iam_core_test
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client
          mysql --protocol=tcp -h "$DB_HOST" -P "$DB_PORT" -u "$DB_USER" -p"$DB_PASS" -e "CREATE DATABASE IF NOT EXISTS \`$DB_NAME\` CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"

      # -------------------------------------------------
      # 9) Run Unit + Integration Tests (PHPUnit)
      # -------------------------------------------------
      - name: Run PHPUnit
        env:
          APP_ENV: testing
          APP_DEBUG: "false"
          APP_TIMEZONE: Africa/Cairo

          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: iam_core_test
          DB_USER: root
          DB_PASS: root

          # Lookup HMAC secret (Blind-index key)
          EMAIL_BLIND_INDEX_KEY: "test-blind-index-key-32-chars-long-!!"

          # Crypto key ring (32 bytes key material)
          CRYPTO_ACTIVE_KEY_ID: v1
          CRYPTO_KEYS: '[{"id":"v1","key":"12345678901234567890123456789012"}]'

        run: composer test

      # -------------------------------------------------
      # 10) Static Analysis (PHPStan)
      # -------------------------------------------------
      - name: Run PHPStan
        run: composer analyse

      # -------------------------------------------------
      # 11) Syntax Lint Check
      # -------------------------------------------------
      - name: Lint PHP files
        run: |
          find ./src ./tests -type f -name "*.php" -print0 | xargs -0 -n1 php -l