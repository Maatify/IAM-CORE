name: IAM-CORE CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  quality:
    name: Quality Checks (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    # -------------------------------------------------
    # MySQL Service (Integration Test Database)
    # -------------------------------------------------
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: iam_core_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    # -------------------------------------------------
    # Global Environment Variables (Testing Mode)
    # -------------------------------------------------
    env:
      APP_ENV: testing
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: iam_core_test
      DB_USER: root
      DB_PASS: root
      IAM_LOOKUP_SECRET: test-lookup-secret-32-chars-long!!!!

    strategy:
      fail-fast: false
      matrix:
        php: [ "8.2", "8.3", "8.4" ]

    steps:
      # -------------------------------------------------
      # 1) Checkout Repository
      # -------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------------------------
      # 2) Setup PHP Environment
      # -------------------------------------------------
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
          coverage: none

      # -------------------------------------------------
      # 3) Wait for MySQL to Become Ready
      # -------------------------------------------------
      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            mysqladmin ping -h 127.0.0.1 -proot && break
            sleep 2
          done

      # -------------------------------------------------
      # 4) Cache Composer Dependencies
      # -------------------------------------------------
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      # -------------------------------------------------
      # 5) Validate composer.json Structure
      # -------------------------------------------------
      - name: Validate composer.json
        run: composer validate --strict

      # -------------------------------------------------
      # 6) Install Project Dependencies
      # -------------------------------------------------
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      # -------------------------------------------------
      # 7) Verify Platform Requirements
      # -------------------------------------------------
      - name: Check platform requirements
        run: composer check-platform-reqs

      # -------------------------------------------------
      # 8) Security Audit (Fail on Vulnerabilities)
      # -------------------------------------------------
      - name: Composer Security Audit
        run: composer audit --format=plain

      # -------------------------------------------------
      # 9) Optimize Autoload for Performance
      # -------------------------------------------------
      - name: Optimize autoload
        run: composer dump-autoload --optimize

      # -------------------------------------------------
      # 10) Run PHPUnit (Unit + Integration)
      # -------------------------------------------------
      - name: Run PHPUnit
        run: composer test

      # -------------------------------------------------
      # 11) Static Analysis (PHPStan Level Max)
      # -------------------------------------------------
      - name: Run PHPStan
        run: composer analyse

      # -------------------------------------------------
      # 12) Syntax Lint Check
      # -------------------------------------------------
      - name: Lint PHP files
        run: |
          find ./src ./tests -type f -name "*.php" -print0 | xargs -0 -n1 php -l