name: IAM-CORE CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  quality:
    name: Quality Checks (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: [ "8.2", "8.3", "8.4" ]

    steps:
      # -------------------------------------------------
      # 1) Checkout Repository
      # -------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------------------------
      # 2) Setup PHP Environment
      # -------------------------------------------------
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
          coverage: none

      # -------------------------------------------------
      # 3) Cache Composer Dependencies
      # -------------------------------------------------
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      # -------------------------------------------------
      # 4) Validate composer.json Structure
      # -------------------------------------------------
      - name: Validate composer.json
        run: composer validate --strict

      # -------------------------------------------------
      # 5) Install Project Dependencies
      # -------------------------------------------------
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      # -------------------------------------------------
      # 6) Verify Platform Requirements
      # -------------------------------------------------
      - name: Check platform requirements
        run: composer check-platform-reqs

      # -------------------------------------------------
      # 7) Security Audit (Fail on Vulnerabilities)
      # -------------------------------------------------
      - name: Composer Security Audit
        run: composer audit --format=plain

      # -------------------------------------------------
      # 8) Optimize Autoload for Performance
      # -------------------------------------------------
      - name: Optimize autoload
        run: composer dump-autoload --optimize

      # -------------------------------------------------
      # 9) Run Unit Tests (PHPUnit)
      # -------------------------------------------------
      - name: Run PHPUnit
        run: composer test

      # -------------------------------------------------
      # 10) Static Analysis (PHPStan Level Max)
      # -------------------------------------------------
      - name: Run PHPStan
        run: composer analyse

      # -------------------------------------------------
      # 11) Syntax Lint Check
      # -------------------------------------------------
      - name: Lint PHP files
        run: |
          find ./src ./tests -type f -name "*.php" -print0 | xargs -0 -n1 php -l
